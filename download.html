<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOWNLOADS | V-R-CRAFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- ズーム演出用オーバーレイ --- */
        #zoom-overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            background: white;
            border: 12px solid var(--accent);
            box-shadow: 0 0 100px rgba(34, 197, 94, 0.4);
            border-radius: 3rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            pointer-events: none;
        }
        .dark #zoom-overlay { background: #0f172a; border-color: #10b981; }

        /* --- 詳細表示 --- */
        #detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: white;
            overflow-y: auto;
            animation: detail-appear 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark #detail-view { background: #0f172a; }

        @keyframes detail-appear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .close-btn {
            position: fixed; top: 2rem; right: 2rem;
            z-index: 10001; background: #f1f5f9;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 900; color: #10b981;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .dark .close-btn { background: #1e293b; }
        .close-btn:hover { transform: rotate(90deg) scale(1.1); }

        .detail-layout { max-width: 1100px; margin: 0 auto; padding: 120px 40px; }
    </style>
</head>
<body class="antialiased bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-x-hidden">

    <nav class="fixed top-0 w-full p-4 flex justify-between items-center z-[100] transition-all duration-300">
        <div class="font-black text-2xl tracking-[0.15em] px-4 text-slate-900 dark:text-white uppercase italic">V-R-CRAFT</div>
        <div class="hidden md:flex gap-8 text-[11px] font-black tracking-[0.2em] text-slate-500 dark:text-slate-300 uppercase">
            <a href="index.html" class="hover:text-green-500 transition-colors">HOME</a>
            <a href="download.html" class="hover:text-green-500 transition-colors">DOWNLOAD</a>
            <a href="assistant.html" class="hover:text-green-500 transition-colors">ASSISTANT</a>
            <a href="help.html" class="hover:text-green-500 transition-colors">HELP</a>
            <a href="other_accounts.html" class="hover:text-green-500 transition-colors">SOCIAL</a>
            <a href="discord.html" class="hover:text-blue-500 transition-colors">DISCORD</a>
        </div>
        <button id="dark-mode-toggle" class="bg-slate-100 dark:bg-slate-800 p-2 px-5 rounded-full shadow-sm hover:scale-105 transition-all">
            <span class="dark-hidden">🌙</span>
            <span class="dark-show text-yellow-400">☀️</span>
        </button>
    </nav>

    <main class="pt-48 pb-32 px-8 max-w-7xl mx-auto">
        <div class="bg-orb w-[500px] h-[500px] bg-green-500/10 top-20 right-[-100px]"></div>
        
        <div class="mb-20 animate-fade-in">
            <div class="text-green-600 font-black tracking-[0.5em] uppercase text-[12px] mb-4">Storage Center</div>
            <h1 class="text-7xl md:text-9xl font-black tracking-tighter uppercase italic leading-[0.85] mb-8">
                Artifacts & <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-500 to-teal-500 drop-shadow-sm">Modules</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 max-w-2xl font-medium leading-relaxed">
                厳選されたアドオン、システムスクリプト、および開発リソース。全てのモジュールは最新の Minecraft 安定版でテスト済みです。
            </p>
        </div>

        <div id="addon-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-16 animate-fade-in" style="animation-delay: 0.2s"></div>
    </main>

    <div id="zoom-overlay"></div>
    <div id="detail-view">
        <div class="close-btn" onclick="closeDetail()">✕</div>
        <div id="detail-content"></div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        function createMarkup(item, isDetail = false) {
            if (isDetail) {
                return `
                    <div class="detail-layout animate-fade-in">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                            <div class="relative group">
                                <div class="absolute -inset-4 bg-green-500/20 blur-3xl opacity-0 group-hover:opacity-100 transition duration-700"></div>
                                <img src="${item.image}" class="relative w-full rounded-[3rem] shadow-3xl border-8 border-white dark:border-slate-800 object-cover aspect-video">
                            </div>
                            <div class="text-left">
                                <div class="flex items-center gap-4 mb-8">
                                    <span class="px-5 py-1.5 bg-green-500 text-white rounded-full text-[10px] font-black tracking-widest uppercase">${item.category}</span>
                                    <span class="font-mono text-[12px] text-slate-400 font-bold">${item.version}</span>
                                </div>
                                <h2 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter mb-8 leading-none">${item.title}</h2>
                                <p class="text-xl text-slate-500 dark:text-slate-400 font-medium leading-relaxed mb-12">${item.description}</p>
                                
                                <div class="flex flex-wrap items-center gap-6 p-8 bg-slate-50 dark:bg-slate-900 rounded-[2rem] border border-slate-100 dark:border-slate-800 mb-12">
                                    <div class="flex-1">
                                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Package Size</div>
                                        <div class="text-xl font-black italic">~2.4 MB</div>
                                    </div>
                                    <div class="flex-1 border-x border-slate-200 dark:border-slate-800 px-6">
                                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Last Update</div>
                                        <div class="text-xl font-black italic">2026.03.15</div>
                                    </div>
                                    <div class="flex-1">
                                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Downloads</div>
                                        <div class="text-xl font-black italic">${item.downloads.toLocaleString()}</div>
                                    </div>
                                </div>

                                <a href="${item.file}" download class="group relative inline-flex items-center gap-4 bg-slate-900 dark:bg-white text-white dark:text-slate-950 px-12 py-6 rounded-2xl font-black text-2xl hover:bg-green-600 dark:hover:bg-green-500 dark:hover:text-white transition-all shadow-2xl">
                                    <span>DOWNLOAD MODULE</span>
                                    <span class="text-3xl group-hover:translate-y-1 transition-transform">↓</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="group relative overflow-hidden bg-slate-50 dark:bg-slate-900 rounded-[3rem] border border-slate-100 dark:border-slate-800 transition-all duration-500 hover:shadow-2xl hover:-translate-y-2">
                    <div class="aspect-video overflow-hidden">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="p-10">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black text-green-600 uppercase tracking-widest">${item.category}</span>
                            <span class="text-[10px] font-mono text-slate-400">${item.version}</span>
                        </div>
                        <h3 class="text-4xl font-black italic uppercase tracking-tighter mb-4 group-hover:text-green-500 transition-colors">${item.title}</h3>
                        <p class="text-slate-500 dark:text-slate-400 font-medium mb-10 leading-relaxed">${item.description.substring(0, 70)}...</p>
                        <div class="flex items-center justify-between pt-6 border-t border-slate-200 dark:border-slate-800">
                            <span class="text-[11px] font-black text-slate-400 uppercase">View Details →</span>
                            <span class="text-[11px] font-mono text-slate-300 dark:text-slate-700">${item.downloads.toLocaleString()} DL</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const container = document.getElementById('addon-container');
            if (container) {
                container.innerHTML = addonData.map(item => `
                    <div id="card-${item.id}" onclick="startZoom('${item.id}')" class="cursor-pointer">
                        ${createMarkup(item)}
                    </div>
                `).join('');
            }
        }

        function startZoom(id) {
            const item = addonData.find(d => d.id === id);
            const card = document.getElementById(`card-${id}`);
            const rect = card.getBoundingClientRect();
            const overlay = document.getElementById('zoom-overlay');
            
            overlay.innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">`;
            overlay.style.display = 'block';
            overlay.style.top = rect.top + 'px';
            overlay.style.left = rect.left + 'px';
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';
            overlay.style.opacity = '1';

            requestAnimationFrame(() => {
                overlay.style.top = '0'; overlay.style.left = '0';
                overlay.style.width = '100vw'; overlay.style.height = '100vh';
                overlay.style.borderRadius = '0';
            });

            setTimeout(() => {
                document.getElementById('detail-content').innerHTML = createMarkup(item, true);
                document.getElementById('detail-view').style.display = 'block';
                overlay.style.opacity = '0';
                document.body.style.overflow = 'hidden';
            }, 500);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('zoom-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
