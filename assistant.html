<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ASSISTANT | V-R-CRAFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* チャットエリア */
        #chat-display { max-width: 900px; margin: 40px auto; display: flex; flex-direction: column; gap: 24px; padding: 0 20px 280px 20px; }
        
        .message { 
            padding: 1.25rem 1.75rem; 
            border-radius: 1.75rem; 
            max-width: 85%; 
            font-weight: 500; 
            animation: message-pop 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            line-height: 1.6; 
            word-wrap: break-word; 
            position: relative;
        }

        /* Markdown Styles */
        .message pre { background: rgba(0,0,0,0.1); padding: 1rem; border-radius: 1rem; margin: 1rem 0; overflow-x: auto; }
        .dark .message pre { background: rgba(0,0,0,0.3); }
        .message code { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; background: rgba(0,0,0,0.05); padding: 0.2em 0.4em; border-radius: 0.4em; }
        .dark .message code { background: rgba(255,255,255,0.1); }
        .message pre code { background: none; padding: 0; }
        .message ul, .message ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .message ul { list-style-type: disc; }
        .message ol { list-style-type: decimal; }

        @keyframes message-pop { 
            from { opacity: 0; transform: translateY(20px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .user-message { 
            align-self: flex-end; 
            background: var(--accent); 
            color: white; 
            border-bottom-right-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
        }

        .ai-message { 
            align-self: flex-start; 
            background: white; 
            border: 1px solid #e2e8f0; 
            color: #0f172a; 
            border-bottom-left-radius: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .dark .ai-message { 
            background: #1e293b; 
            border-color: #334155; 
            color: #f1f5f9; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* 入力エリア */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px);
            padding: 1.5rem 2rem 2.5rem; 
            border-top: 1px solid #f1f5f9; 
            z-index: 50; 
        }

        .dark .input-area { background: rgba(15, 23, 42, 0.8); border-color: #1e293b; }
        
        .input-box { max-width: 900px; margin: 0 auto; display: flex; gap: 16px; }
        
        input { 
            flex: 1; padding: 1rem 2rem; border-radius: 1.5rem; 
            border: 2px solid #e2e8f0; outline: none; 
            transition: all 0.3s;
            font-weight: 500;
        }

        .dark input { background: #0f172a; border-color: #334155; color: white; }
        input:focus { border-color: var(--accent); }
        
        .send-btn { 
            background: #0f172a; color: white; padding: 0 2.5rem; 
            border-radius: 1.5rem; font-weight: 900; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 0.1em;
        }

        .dark .send-btn { background: white; color: #0f172a; }
        .send-btn:hover { background: var(--accent); color: white; transform: translateY(-2px); shadow: 0 10px 20px rgba(34, 197, 94, 0.3); }
        .send-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        /* クイックプロンプト */
        .quick-prompts { max-width: 900px; margin: 0 auto 1rem; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .quick-btn { 
            white-space: nowrap; padding: 0.6rem 1.2rem; background: #f1f5f9; 
            border-radius: 1rem; font-size: 11px; font-weight: 900; 
            color: #64748b; transition: all 0.2s; border: 1px solid transparent;
        }
        .dark .quick-btn { background: #1e293b; color: #94a3b8; }
        .quick-btn:hover { border-color: var(--accent); color: var(--accent); background: white; }
        .dark .quick-btn:hover { background: #0f172a; }

        /* ステータスバー */
        .status-bar { 
            max-width: 900px; margin: 16px auto 0; 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 10px; font-weight: 900; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 0.1em; 
        }

        select { 
            background: #f8fafc; border: 1px solid #e2e8f0; 
            border-radius: 8px; padding: 4px 12px; outline: none; 
            cursor: pointer; font-weight: 900;
        }

        .dark select { background: #1e293b; border-color: #334155; color: #94a3b8; }
    </style>
</head>
<body class="antialiased bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <nav class="fixed top-0 w-full p-4 flex justify-between items-center z-[100] transition-all duration-300">
        <div class="font-black text-2xl tracking-[0.15em] px-4 text-slate-900 dark:text-white uppercase italic">V-R-CRAFT</div>
        <div class="hidden md:flex gap-8 text-[11px] font-black tracking-[0.2em] text-slate-500 dark:text-slate-300 uppercase">
            <a href="index.html" class="hover:text-green-500 transition-colors">HOME</a>
            <a href="download.html" class="hover:text-green-500 transition-colors">DOWNLOAD</a>
            <a href="assistant.html" class="hover:text-green-500 transition-colors">ASSISTANT</a>
            <a href="help.html" class="hover:text-green-500 transition-colors">HELP</a>
            <a href="other_accounts.html" class="hover:text-green-500 transition-colors">SOCIAL</a>
            <a href="discord.html" class="hover:text-blue-500 transition-colors">DISCORD</a>
        </div>
        <button id="dark-mode-toggle" class="bg-white dark:bg-slate-800 p-2 px-5 rounded-full shadow-sm hover:scale-105 transition-all">
            <span class="dark-hidden">🌙</span>
            <span class="dark-show text-yellow-400">☀️</span>
        </button>
    </nav>

    <main class="pt-32 min-h-screen">
        <div id="chat-display">
            <div class="message ai-message">こんにちは。V-R-CRAFT AI アシスタントです。アドオン開発、Script API、導入方法などについてお手伝いします。</div>
        </div>

        <div class="input-area">
            <div class="quick-prompts no-scrollbar">
                <button class="quick-btn" onclick="quickPrompt('銃アドオンの作り方を教えて')">銃アドオンの作り方</button>
                <button class="quick-btn" onclick="quickPrompt('Script APIの導入方法は？')">Script API導入</button>
                <button class="quick-btn" onclick="quickPrompt('最新のアドオンは何？')">最新アドオン</button>
                <button class="quick-btn" onclick="quickPrompt('エラーのデバッグ方法は？')">デバッグ方法</button>
            </div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="メッセージを入力..." onkeypress="if(event.key==='Enter') handleSend()">
                <button id="send-btn" class="send-btn" onclick="handleSend()">Send</button>
            </div>
            <div class="status-bar">
                <div class="flex items-center gap-4">
                    <span>Engine:</span>
                    <select id="mode-select">
                        <option value="gemini">Gemini 3 Flash (Latest)</option>
                        <option value="local">LM Studio (Local)</option>
                    </select>
                </div>
                <div class="flex gap-6 items-center">
                    <span class="cursor-pointer hover:text-red-500 transition-colors" onclick="clearChat()">[ CLEAR CHAT ]</span>
                    <span class="cursor-pointer hover:text-green-500 transition-colors" onclick="resetKey()">[ CONFIG API KEY ]</span>
                    <span id="connection-status" class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        SYSTEM READY
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const LOCAL_URL = "http://localhost:1234/v1/chat/completions";
        const CLOUD_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:streamGenerateContent";

        function quickPrompt(text) {
            document.getElementById('user-input').value = text;
            handleSend();
        }

        function clearChat() {
            if (confirm("チャット履歴をクリアしますか？")) {
                const display = document.getElementById('chat-display');
                display.innerHTML = '<div class="message ai-message">こんにちは。V-R-CRAFT AI アシスタントです。アドオン開発、Script API、導入方法などについてお手伝いします。</div>';
            }
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const mode = document.getElementById('mode-select').value;
            const userText = input.value.trim();

            if (!userText || btn.disabled) return;

            btn.disabled = true;
            addMessage(userText, 'user-message');
            input.value = "";
            const aiLoading = addMessage("", 'ai-message');

            try {
                let fullResponse = "";
                
                if (mode === "local") {
                    const res = await fetch(LOCAL_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            messages: [{ role: "user", content: userText }],
                            temperature: 0.7,
                            stream: true
                        })
                    });
                    
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (line.startsWith("data: ")) {
                                const dataStr = line.slice(6);
                                if (dataStr === "[DONE]") break;
                                try {
                                    const data = JSON.parse(dataStr);
                                    const content = data.choices[0].delta.content || "";
                                    fullResponse += content;
                                    aiLoading.innerHTML = marked.parse(fullResponse);
                                } catch (e) {}
                            }
                        }
                    }
                } else {
                    const apiKey = getApiKey();
                    if (!apiKey) {
                        aiLoading.innerHTML = `⚠️ APIキーが設定されていません。<br><span class="cursor-pointer underline" onclick="resetKey()">こちらから設定してください</span>`;
                        throw new Error("API key missing");
                    }
                    
                    const res = await fetch(`${CLOUD_URL}?key=${apiKey}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `あなたはアドオン開発者「Neo」が運営するポータルサイトのサポートAIです。ユーザーの質問に簡潔かつ丁寧に答えてください。質問：${userText}` }] }]
                        })
                    });

                    if (!res.ok) {
                        const errData = await res.json();
                        throw new Error(errData.error?.message || "Connection failed");
                    }

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        
                        let startIdx = buffer.indexOf('{"candidates"');
                        while (startIdx !== -1) {
                            let braceCount = 0;
                            let endIdx = -1;
                            for (let i = startIdx; i < buffer.length; i++) {
                                if (buffer[i] === '{') braceCount++;
                                else if (buffer[i] === '}') {
                                    braceCount--;
                                    if (braceCount === 0) {
                                        endIdx = i;
                                        break;
                                    }
                                }
                            }
                            
                            if (endIdx !== -1) {
                                const jsonStr = buffer.substring(startIdx, endIdx + 1);
                                try {
                                    const data = JSON.parse(jsonStr);
                                    const textChunk = data.candidates[0].content.parts[0].text;
                                    fullResponse += textChunk;
                                    aiLoading.innerHTML = marked.parse(fullResponse);
                                } catch (e) {}
                                buffer = buffer.substring(endIdx + 1);
                                startIdx = buffer.indexOf('{"candidates"');
                            } else {
                                break;
                            }
                        }
                    }
                }
            } catch (err) {
                if (err.message !== "API key missing") {
                    aiLoading.innerHTML = `<span class="text-red-500">Error: ${err.message}</span>`;
                }
            } finally {
                btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }

        function addMessage(text, className) {
            const display = document.getElementById('chat-display');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (className === 'user-message') {
                div.textContent = text;
            } else {
                div.innerHTML = text;
            }
            display.appendChild(div);
            
            display.scrollTo({
                top: display.scrollHeight,
                behavior: 'smooth'
            });
            return div;
        }
    </script>
</body>
</html>

</html>
