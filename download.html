<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOWNLOADS | V-R-CRAFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }

        /* --- ズーム演出用オーバーレイ --- */
        #zoom-overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            background: white;
            border: 8px solid #22c55e;
            box-shadow: 0 0 60px rgba(34, 197, 94, 0.3);
            border-radius: 2.5rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            pointer-events: none;
        }
        .dark #zoom-overlay { background: #0f172a; border-color: #10b981; }

        /* --- カードデザイン --- */
        .artifact-card {
            background: white;
            border-radius: 2.5rem;
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .dark .artifact-card { background: #1e293b; border-color: #334155; }
        .artifact-card:hover { 
            transform: translateY(-12px); 
            border-color: #22c55e; 
            box-shadow: 0 20px 40px rgba(34, 197, 94, 0.15);
        }
        .artifact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.1), transparent);
            transition: left 0.5s;
        }
        .artifact-card:hover::before {
            left: 100%;
        }

        /* --- ダウンロードボタン --- */
        .download-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 12px 24px;
            border-radius: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
        }
        .download-btn:active {
            transform: translateY(0);
        }

        /* --- バッジ --- */
        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 6px 12px;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- アイコン --- */
        .addon-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        /* --- 詳細表示 --- */
        #detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: white;
            overflow-y: auto;
        }
        .dark #detail-view { background: #0f172a; }

        .close-btn {
            position: fixed; top: 2rem; right: 2rem;
            z-index: 10001; background: #f1f5f9;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; color: #10b981;
        }
        .dark .close-btn { background: #1e293b; }

        .detail-layout { max-width: 1000px; margin: 0 auto; padding: 120px 40px; text-align: center; }
    </style>
</head>
<body class="antialiased bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <nav class="fixed top-0 w-full p-4 flex justify-between items-center z-[100] bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors">
        <div class="font-black text-2xl tracking-[0.15em] px-4 text-slate-900 dark:text-white uppercase italic">V-R-CRAFT</div>
        <div class="hidden md:flex gap-6 text-[10px] font-bold tracking-[0.2em] text-slate-500 dark:text-slate-300 uppercase">
            <a href="index.html" class="hover:text-green-500 transition">HOME</a>
            <a href="download.html" class="hover:text-green-500 transition">DOWNLOAD</a>
            <a href="assistant.html" class="hover:text-green-500 transition">ASSISTANT</a>
            <a href="help.html" class="hover:text-green-500 transition">HELP</a>
            <a href="other_accounts.html" class="hover:text-green-500 transition">SOCIAL</a>
            <a href="disocrd.html" class="hover:text-blue-500 transition">DISCORD</a>
        </div>
        <button id="dark-mode-toggle" class="bg-slate-200 dark:bg-slate-700 p-2 px-4 rounded-full shadow-sm hover:scale-105 transition">
            <span class="dark-hidden">🌙</span>
            <span class="dark-show text-yellow-400">☀️</span>
        </button>
    </nav>

    <main class="pt-40 pb-20 px-8 max-w-7xl mx-auto">
        <div class="text-green-600 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Storage Center</div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter uppercase italic mb-20 leading-none">
            Artifacts & <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-500 to-teal-500">Modules</span>
        </h1>

        <div id="addon-container" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
    </main>

    <div id="zoom-overlay"></div>
    <div id="detail-view">
        <div class="close-btn" onclick="closeDetail()">✕</div>
        <div id="detail-content"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // ★ ここを増やすだけでアドオンが追加されます！
        const addonData = [
            {
                id: "gun-addon",
                title: "TACTICAL 3D GUN",
                description: "Script APIを駆使した弾道計算とリコイル。最高峰の戦闘体験を。",
                image: "assets/image/スクリーンショット.png",
                file: "downloads/gun_addon.mcaddon"
            },
            {
                id: "thunder-sword",
                title: "THUNDER SWORD",
                description: "雷を操る伝説の剣。Script APIによる派手なエフェクトを体感せよ。",
                image: "assets/image/thunder.png", // 新しい画像を用意
                file: "downloads/thunder.mcaddon"
            }
        ];

        function createMarkup(item, isDetail = false) {
            return `
                <div class="${isDetail ? 'detail-layout' : 'w-full'}">
                    <img src="${item.image}" class="w-full rounded-[2.5rem] shadow-xl mb-10 border-4 border-slate-50 dark:border-slate-800">
                    <h2 class="${isDetail ? 'text-6xl' : 'text-3xl'} font-black italic uppercase tracking-tighter mb-6">${item.title}</h2>
                    <p class="${isDetail ? 'text-xl' : 'text-sm'} text-slate-500 dark:text-slate-400 font-medium leading-relaxed mb-10 max-w-2xl mx-auto">${item.description}</p>
                    ${isDetail ? `<a href="${item.file}" download class="bg-slate-900 dark:bg-white text-white dark:text-slate-950 px-12 py-5 rounded-2xl font-black text-xl hover:bg-green-600 transition-all">DOWNLOAD PACKAGE ↓</a>` : ''}
                </div>
            `;
        }

        function render() {
            const container = document.getElementById('addon-container');
            container.innerHTML = addonData.map(item => `
                <div id="card-${item.id}" onclick="startZoom('${item.id}')" class="artifact-card">
                    ${createMarkup(item)}
                </div>
            `).join('');
        }

        function startZoom(id) {
            const item = addonData.find(d => d.id === id);
            const card = document.getElementById(`card-${id}`);
            const rect = card.getBoundingClientRect();
            const overlay = document.getElementById('zoom-overlay');
            
            overlay.innerHTML = createMarkup(item, true);
            overlay.style.display = 'block';
            overlay.style.top = rect.top + 'px';
            overlay.style.left = rect.left + 'px';
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';
            overlay.style.opacity = '1';

            requestAnimationFrame(() => {
                overlay.style.top = '0'; overlay.style.left = '0';
                overlay.style.width = '100vw'; overlay.style.height = '100vh';
                overlay.style.borderRadius = '0';
            });

            setTimeout(() => {
                document.getElementById('detail-content').innerHTML = createMarkup(item, true);
                document.getElementById('detail-view').style.display = 'block';
                overlay.style.opacity = '0';
                document.body.style.overflow = 'hidden';
            }, 500);
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('zoom-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        render();
    </script>
</body>
</html>
